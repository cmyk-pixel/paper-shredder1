<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Paper Shredder — Alice Comi</title>
<style>
  @font-face {
    font-family: 'AvenirLocal';
    src: local('Avenir Next'), local('Avenir');
  }

  :root{
    --bg: #ffffff;
    --ink: #1c1c1a;
    --rule: #d8d5cc;
    --maxw: 393px; /* iPhone 17 기준 CSS 논리 폭 */
    --type-size: 15px;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'AvenirLocal', 'Avenir Next', Avenir, -apple-system, 'Helvetica Neue', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    height: 100%;
    touch-action: pan-y;
  }

  #page{
    position: relative;
    width: 100%;
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 56px 26px 44px;
    user-select: none;
  }

  .title-block{
    text-align: center;
    margin-bottom: 40px;
  }
  .title-block h1{
    font-weight: 400;
    font-size: var(--type-size);
    line-height: 1.5;
    letter-spacing: 0.01em;
    margin: 0 0 18px;
  }
  .byline{
    font-size: var(--type-size);
    font-weight: 400;
    line-height: 1.5;
    margin: 0;
  }

  .columns{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 22px;
    margin-bottom: 40px;
  }

  .col p{
    font-size: var(--type-size);
    font-weight: 400;
    line-height: 1.5;
    margin: 0;
    color: var(--ink);
    white-space: pre-wrap;
  }

  .meta{
    text-align: center;
    font-size: var(--type-size);
    font-weight: 400;
    line-height: 1.5;
  }
  .meta p{ margin: 0; white-space: pre-wrap; }
  .editors{
    text-align: center;
    font-size: var(--type-size);
    font-weight: 400;
    line-height: 1.5;
    margin-top: 26px;
  }

  .word{
    display: inline-block;
    color: var(--ink);
    opacity: 1;
    will-change: opacity, color;
  }
  .word.fading{
    color: #c23b2a;
    transition: color 0.2s ease;
  }
  .word.faded{
    color: #c23b2a;
    opacity: 0;
    transition: color 0.2s ease, opacity 0.5s ease 0.2s;
  }

  #scramble-layer{
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.9s ease;
  }
  #scramble-layer.show{
    opacity: 1;
    pointer-events: auto;
  }
  #scramble-layer .scramble-word{
    position: absolute;
    font-size: 13px;
    font-weight: 400;
    color: var(--ink);
    white-space: nowrap;
    transition: opacity 1.1s ease;
    opacity: 1;
  }
  #scramble-layer.fading-out .scramble-word{
    opacity: 0;
  }

  #edit-toggle{
    position: fixed;
    bottom: 18px;
    right: 18px;
    z-index: 80;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid var(--rule);
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.45;
    cursor: pointer;
  }
  #edit-toggle:hover{ opacity: 0.85; }

  .panel-backdrop{
    position: fixed; inset: 0;
    background: rgba(20,20,18,0.45);
    z-index: 90;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .panel-backdrop.show{ display: flex; }
  .panel{
    background: var(--bg);
    border-radius: 14px;
    padding: 22px;
    width: 100%;
    max-width: 420px;
    max-height: 84vh;
    overflow-y: auto;
    box-shadow: 0 18px 50px rgba(0,0,0,0.25);
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }
  .panel h3{
    margin: 0 0 12px;
    font-size: 14.5px;
    font-weight: 500;
  }
  .panel label{
    font-size: 11.5px;
    color: #6b6a64;
    display: block;
    margin-bottom: 4px;
  }
  .panel input[type=password],
  .panel input[type=text],
  .panel textarea{
    width: 100%;
    font-family: inherit;
    font-weight: 400;
    font-size: 14px;
    padding: 9px 11px;
    border: 1px solid var(--rule);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
    margin-bottom: 10px;
    resize: vertical;
  }
  .panel textarea{ font-size: 13px; }
  .field-group{
    border-top: 1px solid var(--rule);
    padding-top: 12px;
    margin-top: 12px;
  }
  .panel-row{
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .panel-row button{
    flex: 1;
    font-family: inherit;
    font-size: 13px;
    padding: 9px 10px;
    border-radius: 8px;
    border: 1px solid var(--rule);
    background: #fff;
    color: var(--ink);
    cursor: pointer;
  }
  .panel-row button.primary{
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .panel small{
    display:block;
    color: #6b6a64;
    font-size: 11px;
    margin: -4px 0 10px;
    line-height: 1.5;
  }
  .err-msg{
    color: #b5402c;
    font-size: 12px;
    margin: -4px 0 8px;
    min-height: 14px;
  }
  .size-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom: 10px;
  }
  .size-row input[type=range]{ flex:1; }
  .size-row span{ font-size:12px; width:34px; text-align:right; color: #6b6a64; }

  .save-toast{
    position: fixed;
    bottom: 66px;
    right: 18px;
    background: var(--ink);
    color: #fff;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 8px;
    z-index: 95;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    font-family: -apple-system, sans-serif;
  }
  .save-toast.show{ opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="page">
  <div class="title-block">
    <h1 id="display-title">Paper<br>Shredder</h1>
    <p class="byline" id="display-author">Alice Comi</p>
  </div>

  <div class="columns" id="wordwrap">
    <div class="col"><p id="display-left"></p></div>
    <div class="col"><p id="display-right"></p></div>
  </div>

  <div class="meta">
    <p id="display-meta"></p>
    <p class="editors" id="display-editors"></p>
  </div>
</div>

<div id="scramble-layer"></div>

<button id="edit-toggle" aria-label="편집">✎</button>

<div class="panel-backdrop" id="pw-backdrop">
  <div class="panel">
    <h3>편집 모드 잠금 해제</h3>
    <small>비밀번호를 입력하면 이 페이지의 내용과 글자 크기를 수정할 수 있어요. 수정한 내용은 이 링크에 접속하는 모든 사람에게 똑같이 보여요.</small>
    <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="off">
    <div class="err-msg" id="pw-err"></div>
    <div class="panel-row">
      <button id="pw-cancel">취소</button>
      <button class="primary" id="pw-submit">확인</button>
    </div>
  </div>
</div>

<div class="panel-backdrop" id="edit-backdrop">
  <div class="panel">
    <h3>편집 도구</h3>

    <label>전체 글자 크기 (px) — 제목과 본문 동일</label>
    <div class="size-row">
      <input type="range" id="size-all" min="11" max="22" step="0.5">
      <span id="size-all-val"></span>
    </div>

    <div class="field-group">
      <label>제목</label>
      <textarea id="edit-title" rows="2"></textarea>
      <label>저자</label>
      <textarea id="edit-author" rows="1"></textarea>
      <label>왼쪽 본문</label>
      <textarea id="edit-left" rows="10"></textarea>
      <label>오른쪽 본문</label>
      <textarea id="edit-right" rows="10"></textarea>
      <label>하단 정보</label>
      <textarea id="edit-meta" rows="5"></textarea>
      <label>편집자 표기</label>
      <textarea id="edit-editors" rows="1"></textarea>
    </div>

    <div class="panel-row">
      <button id="reset-content">내용 초기화</button>
      <button id="cancel-edit">취소</button>
      <button class="primary" id="save-exit">저장하고 닫기</button>
    </div>

    <div class="field-group">
      <label>비밀번호 변경</label>
      <input type="text" id="new-pw" placeholder="새 비밀번호 (4자 이상)">
      <div class="panel-row">
        <button class="primary" id="save-new-pw">비밀번호 저장</button>
      </div>
      <small>이 페이지는 하나의 링크로 모두에게 동일하게 공유돼요. 비밀번호를 모르면 다른 기기에서는 수정할 수 없고, 보기와 화면 문지르기 인터랙션만 가능해요.</small>
    </div>
  </div>
</div>

<div class="save-toast" id="save-toast"></div>

<script>
/* ============================================================
   설정 — JSONBin.io 연동 정보
   본인의 JSONBin 계정에서 발급받은 X-Master-Key와,
   미리 만들어둔 Bin의 ID를 아래 두 줄에 채워 넣으세요.
   (자세한 절차는 별도 안내 참고)
============================================================ */
var JSONBIN_API_KEY = "$2a$10$WjhIvO8AJLybwFtwT0XgaOi7CayGNLLq82CO5s1LlGs40aBmRxdyq";
var JSONBIN_BIN_ID   = "6a3836feda38895dfee7ed6f";
var JSONBIN_BASE = "https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID;

(function(){
  "use strict";

  var DEFAULT_PW = "shredder2019";

  var DEFAULT_CONTENT = {
    title: "Paper\nShredder",
    author: "Alice Comi",
    left: "Keywords:\nconfidentiality, transparency, secrecy,\nmaterial infrastructures,\nobjects, scandals\n\nThis chapter shows\nhow the paper shredder\nmediates aspects of\nconfidentiality,\ntransparency,\nand secrecy in\norganizations.\nFollowing Susan Star\nLeigh's 'tricks of the\ntrade', it conceptualizes\nthe paper shredder as\nmaterial infrastructure\nand retraces its\norganizing force and\neffects.",
    right: "The Oxford Handbook\nof Media, Technology,\nand Organization\nStudies\n\nThis brings\ninto view virtuous\nas well as vicious\npractices in which the\npaper shredder\nbecomes implicated\u2014\nranging from the\nprotection of\nsensitive data,\nto the covering of\nunethical practices.\nThe chapter concludes\nwith suggestions to\nre-conceptualize\nmaterial infrastructures\nin organizations,\nand unveil related\naspects of\nconfidentiality,\ntransparency,\nand secrecy.",
    meta: "Print Publication Date: Dec 2019\nSubject: Business and Management,\nTechnology and Knowledge Management\nOnline Publication Date: Feb 2020\nDOI:10.1093/oxfordhb/9780198809913.013.24",
    editors: "Edited by Timon Beyes, Robin Holt, and Claus Pias"
  };

  var fieldMap = {
    title: "display-title",
    author: "display-author",
    left: "display-left",
    right: "display-right",
    meta: "display-meta",
    editors: "display-editors"
  };

  var state = {
    content: JSON.parse(JSON.stringify(DEFAULT_CONTENT)),
    size: 15,
    pw: DEFAULT_PW
  };

  var jsonbinReady = JSONBIN_API_KEY.indexOf("여기에") === -1 && JSONBIN_BIN_ID.indexOf("여기에") === -1;

  /* ============================================================
     0. JSONBin 원격 저장소 read/write
        설정이 안 된 경우 localStorage로 대체 동작 (기기별 독립)
  ============================================================ */
  function remoteLoad(){
    if (!jsonbinReady){
      try{
        var raw = localStorage.getItem("ps-fallback-data");
        if (raw) return Promise.resolve(JSON.parse(raw));
      }catch(e){}
      return Promise.resolve(null);
    }
    return fetch(JSONBIN_BASE + "/latest", {
      headers: { "X-Master-Key": JSONBIN_API_KEY }
    }).then(function(res){
      if (!res.ok) throw new Error("load failed");
      return res.json();
    }).then(function(data){
      return data && data.record ? data.record : null;
    }).catch(function(){ return null; });
  }

  function remoteSave(data){
    if (!jsonbinReady){
      try{ localStorage.setItem("ps-fallback-data", JSON.stringify(data)); }catch(e){}
      return Promise.resolve(true);
    }
    return fetch(JSONBIN_BASE, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": JSONBIN_API_KEY
      },
      body: JSON.stringify(data)
    }).then(function(res){ return res.ok; }).catch(function(){ return false; });
  }

  /* ============================================================
     1. 화면 렌더 (단어 span 포함)
  ============================================================ */
  function wrapWordsHTML(text){
    var lines = (text || "").split("\n");
    return lines.map(function(line){
      var parts = line.split(/(\s+)/);
      var html = parts.map(function(part){
        if (part === "") return "";
        if (/^\s+$/.test(part)) return part;
        return '<span class="word">' + escapeHtml(part) + '</span>';
      }).join("");
      return html;
    }).join("<br>");
  }

  function escapeHtml(s){
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function renderAll(){
    Object.keys(fieldMap).forEach(function(key){
      var el = document.getElementById(fieldMap[key]);
      el.innerHTML = wrapWordsHTML(state.content[key]);
    });
    document.documentElement.style.setProperty("--type-size", state.size + "px");
  }

  function getAllWordSpans(){
    return Array.prototype.slice.call(document.querySelectorAll(".word"));
  }

  /* ============================================================
     2. 문지르기 인터랙션
  ============================================================ */
  var scrambleActive = false;
  var lastPoint = null;
  var moveAccum = 0;
  var lastTriggerTime = 0;
  var ownerEditing = false;

  function visibleWordSpans(){
    return getAllWordSpans().filter(function(s){
      return !s.classList.contains("faded") && s.textContent.trim() !== "";
    });
  }

  function fadeRandomWords(){
    if (scrambleActive || ownerEditing) return;
    var visible = visibleWordSpans();
    if (visible.length === 0){ triggerDisintegration(); return; }
    var count = Math.min(visible.length, 1 + Math.floor(Math.random() * 5));
    for (var i = visible.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = visible[i]; visible[i] = visible[j]; visible[j] = tmp;
    }
    var chosen = visible.slice(0, count);
    chosen.forEach(function(span){
      span.classList.add("fading");
      setTimeout(function(){
        span.classList.remove("fading");
        span.classList.add("faded");
        checkAllFaded();
      }, 200);
    });
    setTimeout(checkAllFaded, 220);
  }

  function checkAllFaded(){
    if (scrambleActive) return;
    if (visibleWordSpans().length === 0) triggerDisintegration();
  }

  var scrambleAutoRestoreId = null;

  function collectAllWordTexts(){
    return getAllWordSpans().map(function(w){ return w.textContent.trim(); }).filter(Boolean);
  }

  function triggerDisintegration(){
    if (scrambleActive) return;
    scrambleActive = true;
    getAllWordSpans().forEach(function(s){
      s.classList.remove("fading");
      s.classList.add("faded");
    });
    buildScrambleLayer();
    var layer = document.getElementById("scramble-layer");
    layer.classList.remove("fading-out");
    requestAnimationFrame(function(){ layer.classList.add("show"); });
    clearTimeout(scrambleAutoRestoreId);
    scrambleAutoRestoreId = setTimeout(function(){
      restoreOriginalPage();
    }, 5000);
  }

  function buildScrambleLayer(){
    var layer = document.getElementById("scramble-layer");
    layer.innerHTML = "";
    var words = collectAllWordTexts();
    function scrambleChars(w){
      var chars = w.split("");
      for (var i = chars.length - 1; i > 0; i--){
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = chars[i]; chars[i] = chars[j]; chars[j] = tmp;
      }
      return chars.join("");
    }
    var vw = window.innerWidth, vh = window.innerHeight;
    words.forEach(function(w){
      var div = document.createElement("div");
      div.className = "scramble-word";
      div.textContent = scrambleChars(w);
      div.style.left = (Math.random() * Math.max(vw - 80, 40)) + "px";
      div.style.top = (Math.random() * Math.max(vh - 30, 40)) + "px";
      div.style.transform = "rotate(" + (Math.random()*50-25).toFixed(1) + "deg)";
      div.style.fontSize = (12 + Math.random()*10) + "px";
      div.style.opacity = (0.55 + Math.random()*0.45).toFixed(2);
      layer.appendChild(div);
    });
  }

  function restoreOriginalPage(){
    scrambleActive = false;
    clearTimeout(scrambleAutoRestoreId);
    var layer = document.getElementById("scramble-layer");
    layer.classList.remove("show", "fading-out");
    layer.innerHTML = "";
    getAllWordSpans().forEach(function(s){
      s.classList.remove("faded", "fading");
    });
  }

  var page = document.getElementById("page");
  var scrambleLayerEl = document.getElementById("scramble-layer");

  function startPoint(x,y){ lastPoint = {x:x,y:y}; moveAccum = 0; }
  function movePoint(x,y){
    if (ownerEditing) return;
    if (scrambleActive) return;
    if (!lastPoint) return;
    var dx = x-lastPoint.x, dy = y-lastPoint.y;
    var dist = Math.sqrt(dx*dx+dy*dy);
    lastPoint = {x:x,y:y};
    moveAccum += dist;
    var now = Date.now();
    if (moveAccum > 14 && (now-lastTriggerTime) > 90){
      lastTriggerTime = now;
      moveAccum = 0;
      fadeRandomWords();
    }
  }
  function endPoint(){ lastPoint = null; moveAccum = 0; }

  page.addEventListener("touchstart", function(e){
    if (e.touches && e.touches.length) startPoint(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:true});
  page.addEventListener("touchmove", function(e){
    if (e.touches && e.touches.length) movePoint(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:true});
  page.addEventListener("touchend", endPoint, {passive:true});

  var mouseDown = false;
  page.addEventListener("mousedown", function(e){
    if (ownerEditing) return;
    mouseDown = true;
    startPoint(e.clientX, e.clientY);
  });
  window.addEventListener("mousemove", function(e){
    if (!mouseDown) return;
    movePoint(e.clientX, e.clientY);
  });
  window.addEventListener("mouseup", function(){ mouseDown = false; endPoint(); });

  /* ============================================================
     3. 편집 모드 UI (마우스 클릭 / 터치 모두 표준 click 이벤트)
  ============================================================ */
  var editToggleBtn = document.getElementById("edit-toggle");
  var pwBackdrop = document.getElementById("pw-backdrop");
  var pwInput = document.getElementById("pw-input");
  var pwErr = document.getElementById("pw-err");
  var editBackdrop = document.getElementById("edit-backdrop");
  var sizeAll = document.getElementById("size-all");
  var sizeAllVal = document.getElementById("size-all-val");

  editToggleBtn.addEventListener("click", function(){
    pwErr.textContent = "";
    pwInput.value = "";
    pwBackdrop.classList.add("show");
    setTimeout(function(){ pwInput.focus(); }, 50);
  });

  document.getElementById("pw-cancel").addEventListener("click", function(){
    pwBackdrop.classList.remove("show");
  });

  function trySubmitPw(){
    if (pwInput.value === state.pw){
      pwBackdrop.classList.remove("show");
      enterEditMode();
    } else {
      pwErr.textContent = "비밀번호가 올바르지 않아요.";
    }
  }
  document.getElementById("pw-submit").addEventListener("click", trySubmitPw);
  pwInput.addEventListener("keydown", function(e){ if (e.key === "Enter") trySubmitPw(); });

  function enterEditMode(){
    ownerEditing = true;
    if (scrambleActive) restoreOriginalPage();
    getAllWordSpans().forEach(function(s){ s.classList.remove("faded", "fading"); });

    document.getElementById("edit-title").value = state.content.title;
    document.getElementById("edit-author").value = state.content.author;
    document.getElementById("edit-left").value = state.content.left;
    document.getElementById("edit-right").value = state.content.right;
    document.getElementById("edit-meta").value = state.content.meta;
    document.getElementById("edit-editors").value = state.content.editors;
    sizeAll.value = state.size;
    sizeAllVal.textContent = Math.round(state.size) + "px";

    editBackdrop.classList.add("show");
  }

  document.getElementById("cancel-edit").addEventListener("click", function(){
    ownerEditing = false;
    editBackdrop.classList.remove("show");
  });

  document.getElementById("save-exit").addEventListener("click", function(){
    state.content.title = document.getElementById("edit-title").value;
    state.content.author = document.getElementById("edit-author").value;
    state.content.left = document.getElementById("edit-left").value;
    state.content.right = document.getElementById("edit-right").value;
    state.content.meta = document.getElementById("edit-meta").value;
    state.content.editors = document.getElementById("edit-editors").value;

    renderAll();
    ownerEditing = false;
    editBackdrop.classList.remove("show");

    remoteSave({ content: state.content, size: state.size, pw: state.pw }).then(function(ok){
      showToast(ok ? "저장됨 — 모두에게 반영됐어요" : "저장에 문제가 있었어요. 연결을 확인해주세요");
    });
  });

  document.getElementById("reset-content").addEventListener("click", function(){
    if (!confirm("저장된 내용을 모두 초기 상태로 되돌릴까요? 모든 접속자에게 반영돼요.")) return;
    state.content = JSON.parse(JSON.stringify(DEFAULT_CONTENT));
    state.size = 15;
    renderAll();
    ownerEditing = false;
    editBackdrop.classList.remove("show");
    remoteSave({ content: state.content, size: state.size, pw: state.pw }).then(function(){
      showToast("초기화됐어요");
    });
  });

  sizeAll.addEventListener("input", function(){
    state.size = parseFloat(sizeAll.value);
    document.documentElement.style.setProperty("--type-size", state.size + "px");
    sizeAllVal.textContent = Math.round(state.size) + "px";
  });

  document.getElementById("save-new-pw").addEventListener("click", function(){
    var v = document.getElementById("new-pw").value.trim();
    if (v.length >= 4){
      state.pw = v;
      document.getElementById("new-pw").value = "";
      remoteSave({ content: state.content, size: state.size, pw: state.pw }).then(function(ok){
        showToast(ok ? "비밀번호가 변경됐어요" : "저장에 문제가 있었어요");
      });
    } else if (v.length > 0){
      showToast("4자 이상 입력해주세요");
    }
  });

  /* ============================================================
     4. 토스트
  ============================================================ */
  var toastEl = document.getElementById("save-toast");
  var toastTimer = null;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 2200);
  }

  /* ============================================================
     5. 초기 로드
  ============================================================ */
  renderAll();
  remoteLoad().then(function(remote){
    if (remote){
      if (remote.content && typeof remote.content === "object"){
        Object.keys(DEFAULT_CONTENT).forEach(function(key){
          if (typeof remote.content[key] === "string" && remote.content[key].length > 0){
            state.content[key] = remote.content[key];
          }
        });
      }
      if (typeof remote.size === "number" && remote.size > 0) state.size = remote.size;
      if (typeof remote.pw === "string" && remote.pw.length > 0) state.pw = remote.pw;
      renderAll();
    }
  }).catch(function(){
    /* 원격 로드 실패 시에도 화면은 기본 콘텐츠로 이미 정상 표시된 상태 */
  });

})();
</script>
</body>
</html>
